# Workflow de Integração Contínua (CI) para o Guia Interativo de IA
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Dependências
        run: npm install

      - name: Validar Linter (TypeScript)
        run: npm run lint

      - name: Compilar Aplicação (Build)
        run: npm run build
